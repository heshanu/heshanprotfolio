<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Sanjeev.V</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --card: #121b2b;
    --line: #26374f;
    --cyan: #00d4ff;
    --text: #d4e6ff;
    --text-dim: #8ba0bf;
    --mono: 'JetBrains Mono', monospace;
    --bg-shift-x: 0px;
    --bg-shift-y: 0px;
    --light-x: 50%;
    --light-y: 34%;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    min-height: 100%;
    background-color: transparent;
    overflow-x: hidden;
  }
  body {
    font-family: var(--mono);
    background: transparent;
    background-color: transparent;
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  .theme-cinematic-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
    background: radial-gradient(120% 100% at 50% 0%, #041124 0%, #01060f 42%, #000 100%);
  }
  .theme-cinematic-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(460px 300px at var(--light-x) var(--light-y), rgba(20, 184, 255, 0.22), transparent 72%),
      radial-gradient(680px 420px at 50% 40%, rgba(12, 155, 230, 0.14), transparent 74%),
      radial-gradient(55% 40% at 50% 45%, rgba(0, 212, 255, 0.1), transparent 78%);
    mix-blend-mode: screen;
  }
  .theme-cinematic-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(0, 198, 255, 0.08) 0 1px, transparent 1px 24px),
      repeating-linear-gradient(90deg, rgba(0, 198, 255, 0.08) 0 1px, transparent 1px 24px);
    opacity: 0.34;
    transform: translate3d(calc(var(--bg-shift-x) * 0.22), calc(var(--bg-shift-y) * 0.12), 0);
  }
  .theme-cinematic-bg .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 80% at 80% 18%, rgba(34, 114, 255, 0.16), transparent 62%),
      radial-gradient(80% 70% at 8% 92%, rgba(0, 170, 255, 0.1), transparent 65%),
      linear-gradient(180deg, rgba(2, 9, 18, 0.5), rgba(0, 0, 0, 0.86));
  }
  .theme-cinematic-bg .bg-dots {
    position: absolute;
    inset: -4%;
    background-image: radial-gradient(rgba(0, 207, 255, 0.65) 1px, transparent 1.6px);
    background-size: 24px 24px;
    opacity: 0.28;
    transform: translate3d(calc(var(--bg-shift-x) * 0.34), calc(var(--bg-shift-y) * 0.2), 0);
  }
  .theme-cinematic-bg .bg-particles {
    position: absolute;
    inset: -10%;
    background-repeat: repeat;
    opacity: 0.45;
    animation: particleDrift 50s linear infinite;
  }
  .theme-cinematic-bg .bg-particles.p1 {
    background-image:
      radial-gradient(circle at 12% 20%, rgba(214, 242, 255, 0.9) 0 1px, transparent 2px),
      radial-gradient(circle at 36% 66%, rgba(175, 225, 255, 0.8) 0 1px, transparent 2px),
      radial-gradient(circle at 74% 28%, rgba(220, 238, 255, 0.86) 0 1px, transparent 2px),
      radial-gradient(circle at 88% 74%, rgba(154, 210, 255, 0.78) 0 1px, transparent 2px);
    background-size: 280px 280px;
    animation-duration: 80s;
  }
  .theme-cinematic-bg .bg-particles.p2 {
    background-image:
      radial-gradient(circle at 18% 30%, rgba(176, 224, 255, 0.88) 0 1.5px, transparent 2.4px),
      radial-gradient(circle at 48% 60%, rgba(190, 232, 255, 0.86) 0 1.5px, transparent 2.4px),
      radial-gradient(circle at 82% 36%, rgba(155, 213, 255, 0.82) 0 1.5px, transparent 2.4px);
    background-size: 360px 360px;
    opacity: 0.35;
    animation-duration: 110s;
    animation-direction: reverse;
  }
  .theme-cinematic-bg .bg-shapes {
    position: absolute;
    inset: 0;
    transform: translate3d(calc(var(--bg-shift-x) * 0.5), calc(var(--bg-shift-y) * 0.3), 0);
  }
  .theme-cinematic-bg .shape {
    position: absolute;
    opacity: 0.54;
    filter: drop-shadow(0 0 24px rgba(0, 212, 255, 0.18));
    animation: shapeFloat 16s ease-in-out infinite;
    transform-style: preserve-3d;
  }
  .theme-cinematic-bg .shape.sphere {
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(160, 220, 255, 0.46), rgba(24, 84, 140, 0.26) 62%, rgba(0, 0, 0, 0) 100%);
  }
  .theme-cinematic-bg .shape.cube,
  .theme-cinematic-bg .shape.tilt-square {
    background: linear-gradient(145deg, rgba(34, 215, 255, 0.34), rgba(62, 112, 255, 0.2));
    border: 1px solid rgba(130, 218, 255, 0.22);
    box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.12);
  }
  .theme-cinematic-bg .shape.triangle {
    width: 0;
    height: 0;
    border-left: 36px solid transparent;
    border-right: 36px solid transparent;
    border-bottom: 62px solid rgba(84, 233, 190, 0.32);
    background: none;
    filter: drop-shadow(0 0 16px rgba(84, 233, 190, 0.22));
  }
  .theme-cinematic-bg .shape.s1 { width: 98px; height: 98px; left: 62%; top: 12%; animation-delay: -3s; }
  .theme-cinematic-bg .shape.s2 { width: 74px; height: 74px; left: 79%; top: 26%; background: radial-gradient(circle at 34% 36%, rgba(130, 204, 255, 0.38), rgba(30, 87, 147, 0.2) 64%, transparent 100%); animation-delay: -9s; }
  .theme-cinematic-bg .shape.s3 { width: 88px; height: 88px; left: 22%; top: 42%; background: radial-gradient(circle at 30% 30%, rgba(198, 105, 233, 0.34), rgba(96, 36, 140, 0.2) 62%, transparent 100%); animation-delay: -6s; }
  .theme-cinematic-bg .shape.s4 { width: 70px; height: 70px; left: 70%; top: 68%; animation-delay: -12s; }
  .theme-cinematic-bg .shape.s5 { width: 94px; height: 94px; left: 85%; top: 74%; background: radial-gradient(circle at 30% 30%, rgba(146, 245, 223, 0.34), rgba(27, 90, 104, 0.2) 62%, transparent 100%); animation-delay: -4s; }
  .theme-cinematic-bg .shape.s6 { left: 86%; top: 24%; --shape-rot: -85deg; animation-delay: -2s; }
  .theme-cinematic-bg .shape.s7 { width: 90px; height: 90px; left: 31%; top: 66%; --shape-rot: 18deg; animation-delay: -7s; }
  .theme-cinematic-bg .shape.s8 { left: 58%; top: 34%; --shape-rot: 37deg; animation-delay: -10s; }
  .theme-cinematic-bg .shape.teal {
    background: linear-gradient(140deg, rgba(88, 236, 189, 0.32), rgba(36, 110, 138, 0.2));
    border-color: rgba(119, 238, 200, 0.24);
  }
  .theme-cinematic-bg .shape.purple {
    background: linear-gradient(140deg, rgba(167, 124, 255, 0.32), rgba(69, 56, 132, 0.2));
    border-color: rgba(170, 145, 255, 0.24);
  }
  .theme-cinematic-bg .shape.green {
    background: linear-gradient(140deg, rgba(118, 198, 130, 0.3), rgba(54, 96, 68, 0.2));
    border-color: rgba(155, 228, 170, 0.2);
  }

  body > *:not(.theme-cinematic-bg) {
    position: relative;
    z-index: 1;
  }

  @keyframes particleDrift {
    from { transform: translate3d(0, 0, 0); }
    to { transform: translate3d(-70px, -42px, 0); }
  }
  @keyframes shapeFloat {
    0%, 100% { transform: translate3d(0, 0, 0) rotate(var(--shape-rot, 0deg)); }
    50% { transform: translate3d(0, -16px, 0) rotate(calc(var(--shape-rot, 0deg) + 8deg)); }
  }

  .txt-animate {
    opacity: 0;
    transform: translateY(4px);
    filter: none;
    animation: txtReveal 0.26s ease-out forwards;
    animation-delay: var(--txt-delay, 0ms);
  }

  @keyframes txtReveal {
    to {
      opacity: 1;
      transform: translateY(0);
      filter: none;
    }
  }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 56px 18px 36px;
  }

  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    padding: 18px 18px 14px;
    border: 1px solid rgba(38, 55, 79, 0.95);
    border-radius: 14px;
    background: rgba(12, 23, 39, 0.62);
    backdrop-filter: blur(4px);
  }

  .top-left {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .kicker {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .title {
    font-size: clamp(30px, 5.6vw, 52px);
    color: var(--cyan);
    letter-spacing: 0.8px;
    line-height: 1.05;
  }

  .back {
    text-decoration: none;
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px;
  }
  .back:hover { border-color: var(--cyan); color: var(--cyan); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 14px;
    justify-items: center;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 24px rgba(2, 7, 14, 0.35);
    width: 100%;
    max-width: 360px;
  }

  .photo-wrap {
    position: relative;
  }

  .card img {
    width: 100%;
    height: 190px;
    object-fit: cover;
    display: block;
  }

  .caption {
    padding: 10px 12px 12px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.55;
  }

  .caption strong {
    display: block;
    color: var(--text);
    font-size: 13px;
    margin-bottom: 4px;
  }

  @media (max-width: 860px) {
    .grid { grid-template-columns: 1fr; }
    .card {
      width: 92%;
      max-width: 360px;
    }
    .card img { height: 168px; }
    .top { flex-direction: column; align-items: flex-start; }
    .wrap { padding: 34px 14px 28px; }
  }

  @media (max-width: 480px) {
    .card {
      width: 90%;
      max-width: 320px;
    }
    .card img { height: 148px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .theme-cinematic-bg .bg-particles,
    .theme-cinematic-bg .shape,
    .txt-animate {
      animation: none !important;
      transform: none !important;
      opacity: 1 !important;
    }

    .theme-cinematic-bg .bg-shapes {
      transform: none !important;
    }
  }
</style>
</head>
<body>
  <div class="theme-cinematic-bg" aria-hidden="true">
    <div class="bg-gradient"></div>
    <div class="bg-dots"></div>
    <div class="bg-particles p1"></div>
    <div class="bg-particles p2"></div>
    <div class="bg-shapes">
      <span class="shape cube s1"></span>
      <span class="shape sphere s2"></span>
      <span class="shape sphere s3"></span>
      <span class="shape sphere s4 green"></span>
      <span class="shape sphere s5"></span>
      <span class="shape triangle s6"></span>
      <span class="shape tilt-square s7 teal"></span>
      <span class="shape tilt-square s8 purple"></span>
    </div>
  </div>

  <main class="wrap">
    <div class="top">
      <div class="top-left">
        <p class="kicker">// PHOTO GALLERY</p>
        <h1 class="title">Events & Competitions</h1>
      </div>
      <a class="back" href="Sanjeevportfolio.html">Back to Home</a>
    </div>

    <section class="grid" id="galleryGrid" aria-label="Events and competitions gallery">
    </section>
  </main>

  <script>
    const CAPTION_MAP = {
      2: ['During the Artificial Intelligence viva', 'SLIIT NORTHERN UNI'],
      3: ['CodeFest Group Photo', 'SLIIT UNI'],
      4: ['TOP 10 SLIIT Code fest - 2024', ' SLIIT UNI'],
      5: ['Team Northern Knights', 'SLIIT UNI'],
      6: ['Team Detech', 'Yarl IT Hub'],
      7: ['Team Detch', 'Yarl IT Hub'],
      8: ['Team Codinators - SLIIT Codefest - 2024', 'SLIIT UNI'],
      9: ['Winner of the Movie Competition', 'SLIIT NORTHERN UNI'],
      10: ['Winner of the Movie Competition', 'SLIIT NORTHERN UNI'],
      11: ['Object-Oriented Programming', 'SLIIT NORTHERN UNI'],
      12: ['During The Code Art Challenge Competition - 2025', 'Q4US'],
      13: ['Team Northern Knights - Code Art Challenge', 'Q4US'],
      14: ['Team Northern Knights - Code Art Challenge', 'Q4US'],
      15: ['Winner Of The Code Art Challenge - 2025', 'SLIIT NORTHERN UNI'],
      16: ['Winner Of The Code Art Challenge - 2025', 'SLIIT NORTHERN UNI'],
      17: ['Awarding Ceremony', 'SLIIT NORTHERN UNI'],
      18: ['Awarding Ceremony', 'Q4US'],
      19: ['Awarding Ceremony', 'SLIIT NORTHERN UNI'],
      20: ['Net Com chellenge - 2025', 'SLIIT UNI'],
      21: ['Team Nothern Knights', 'SLIIT UNI'],
      22: ['Awarding Ceremony', 'Q4US'],
      23: ['Official Launch of the OOIVU Hotel Management System', 'INNOVAY'],
      24: ['Space Fest - 2025', 'SLIIT Northern University'],
      25: ['Event Highlight', 'Captured during a major event highlight moment.'],
      26: ['Net Com Chellenge Awarding Ceremony', 'SLIIT NORTHERN UNI'],
      27: ['Net Com Chellenge Awarding Ceremony', 'SLIIT NORTHERN UNI'],
      28: ['Professional Skills Workshop', 'SLIIT NORTHERN UNI'],
      29: ['Team HABB', 'SLIIT UNI'],
      30: ['Net Com Chellenge Awarding Ceremony', 'SLIIT NORTHERN UNI'],
      31: ['Team HABB', 'SLIIT UNI'],
      32: ['Team HABB', 'SLIIT UNI'],
    };

    const grid = document.getElementById('galleryGrid');
    for (let i = 2; i <= 32; i += 1) {
      const [title, desc] = CAPTION_MAP[i] || ['Important Event', 'Captured during an important event and competition moment.'];

      const card = document.createElement('article');
      card.className = 'card';

      const wrap = document.createElement('div');
      wrap.className = 'photo-wrap';

      const img = document.createElement('img');
      img.src = `sanjee${i}.jpg`;
      img.alt = `${title} - sanjee${i}`;

      img.addEventListener('error', () => {
        card.remove();
      });

      const caption = document.createElement('p');
      caption.className = 'caption';
      caption.innerHTML = `<strong>${title}</strong>${desc}`;

      wrap.appendChild(img);
      card.appendChild(wrap);
      card.appendChild(caption);
      grid.appendChild(card);
    }

    (function initThemeParallax() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      if (window.matchMedia('(hover: none), (pointer: coarse)').matches) return;

      const root = document.documentElement;
      let rafId = 0;
      let tx = 0;
      let ty = 0;
      let cx = 0;
      let cy = 0;

      function tick() {
        cx += (tx - cx) * 0.08;
        cy += (ty - cy) * 0.08;
        root.style.setProperty('--bg-shift-x', `${cx.toFixed(2)}px`);
        root.style.setProperty('--bg-shift-y', `${cy.toFixed(2)}px`);
        rafId = requestAnimationFrame(tick);
      }

      window.addEventListener('pointermove', (event) => {
        const px = (event.clientX / window.innerWidth) - 0.5;
        const py = (event.clientY / window.innerHeight) - 0.5;
        tx = px * 18;
        ty = py * 12;
        root.style.setProperty('--light-x', `${(event.clientX / window.innerWidth * 100).toFixed(2)}%`);
        root.style.setProperty('--light-y', `${(event.clientY / window.innerHeight * 100).toFixed(2)}%`);
        if (!rafId) rafId = requestAnimationFrame(tick);
      }, { passive: true });

      window.addEventListener('pointerleave', () => {
        tx = 0;
        ty = 0;
        root.style.setProperty('--light-x', '50%');
        root.style.setProperty('--light-y', '34%');
        if (!rafId) rafId = requestAnimationFrame(tick);
      }, { passive: true });

      rafId = requestAnimationFrame(tick);
    })();

    (function initTextAnimations() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      const targets = Array.from(document.querySelectorAll('h1,h2,h3,h4,h5,h6,p,a,button,label,li,small,strong,em,span'))
        .filter((el) => {
          if ((el.textContent || '').trim().length === 0) return false;
          if (el.closest('.theme-cinematic-bg, script, style')) return false;
          return true;
        });

      let revealIndex = 0;
      const reveal = (el) => {
        if (el.dataset.txtAnimated === '1') return;
        el.dataset.txtAnimated = '1';
        el.style.setProperty('--txt-delay', `${Math.min(revealIndex * 8, 180)}ms`);
        revealIndex += 1;
        el.classList.add('txt-animate');
      };

      if (!('IntersectionObserver' in window)) {
        targets.forEach((el) => reveal(el));
        return;
      }

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          reveal(entry.target);
          obs.unobserve(entry.target);
        });
      }, {
        root: null,
        threshold: 0.02,
        rootMargin: '0px 0px -2% 0px'
      });

      targets.forEach((el) => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.96) {
          reveal(el);
          return;
        }
        observer.observe(el);
      });
    })();
  </script>
</body>
</html>
